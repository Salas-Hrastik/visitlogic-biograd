<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI turistički informator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    header {
      background: #0b6fa4;
      color: white;
      padding: 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 700px;
      width: 100%;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      min-height: 0;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      min-height: 100px;
    }
    .user { text-align: right; margin: 10px 0; }
    .bot { color: #0b6fa4; margin: 10px 0; }
    .row { display: flex; gap: 10px; flex-shrink: 0; }
    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      padding: 12px 20px;
      background: #0b6fa4;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
    }
    button:hover { background: #095d8a; }
  </style>
</head>
<body>
  <header>
    <h2>AI turistički informator</h2>
    <div>Biograd na Moru</div>
  </header>
  <div class="chat">
    <div id="messages" class="messages"></div>
    <div class="row">
      <input id="input" placeholder="Postavite pitanje...">
      <button onclick="sendMessage()">Pošalji</button>
    </div>
  </div>
  <script>
    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = type;
      div.innerText = text;
      document.getElementById("messages").appendChild(div);
      document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, "user");
      input.value = "";
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        const raw = await res.text();
        let data;
        try { data = JSON.parse(raw); } catch { addMessage(raw, "bot"); return; }
        if (data.reply) { addMessage(data.reply, "bot"); }
        else { addMessage("Bot nema odgovor.", "bot"); }
      } catch(err) {
        addMessage("Greška u komunikaciji sa serverom.", "bot");
      }
    }

    document.getElementById("input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });

    addMessage("Dobrodošli u Biograd na Moru \u{1F30A} Kako vam mogu pomoći?", "bot");
  </script>
</body>
</html>
