<!DOCTYPE html>
<html lang="hr">

<head>
<meta charset="UTF-8">
<title>AI turistički informator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0b6fa4;
color:white;
padding:20px;
text-align:center;
}

.chat{
max-width:700px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
}

.messages{
height:350px;
overflow:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.user{
text-align:right;
margin:8px 0;
}

.bot{
color:#0b6fa4;
margin:8px 0;
}

.row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#0b6fa4;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h2>AI turistički informator</h2>
<div>Biograd na Moru</div>
</header>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="row">
<input id="input" placeholder="Postavite pitanje...">
<button onclick="sendMessage()">Pošalji</button>
</div>

</div>

<script>

function addMessage(text,type){

const div=document.createElement("div")
div.className=type
div.innerText=text

document.getElementById("messages").appendChild(div)

}

async function sendMessage(){

const input=document.getElementById("input")

const text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

try{

const res=await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

})

const data=await res.json()

addMessage(data.reply,"bot")

}catch(e){

addMessage("Greška u komunikaciji sa serverom.","bot")

}

}

document.getElementById("input").addEventListener("keydown",function(e){

if(e.key==="Enter") sendMessage()

})

addMessage("Dobrodošli u Biograd na Moru 🌊 Kako vam mogu pomoći?","bot")

</script>

</body>
</html>
