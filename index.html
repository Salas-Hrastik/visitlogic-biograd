<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI turistički informator – Biograd na Moru</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
}

header{
background:#0b6fa4;
color:white;
padding:15px;
text-align:center;
}

.logo{
height:60px;
}

.chat-container{
max-width:700px;
margin:20px auto;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
padding:20px;
}

.messages{
height:350px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.message{
margin-bottom:10px;
}

.user{
text-align:right;
color:#333;
}

.bot{
text-align:left;
color:#0b6fa4;
}

input{
width:80%;
padding:10px;
font-size:16px;
}

button{
padding:10px;
font-size:16px;
background:#0b6fa4;
color:white;
border:none;
cursor:pointer;
}

.quick{
margin-top:10px;
}

.quick button{
margin:4px;
background:#eee;
color:#333;
}

</style>

</head>

<body>

<header>

<h2>AI turistički informator</h2>
<div>Biograd na Moru</div>

</header>

<div class="chat-container">

<div class="messages" id="messages"></div>

<input id="input" placeholder="Postavite pitanje...">
<button onclick="sendMessage()">Pošalji</button>

<div class="quick">

<button onclick="quick('plaže')">🏖 Plaže</button>
<button onclick="quick('restorani')">🍽 Restorani</button>
<button onclick="quick('parking')">🅿 Parking</button>
<button onclick="quick('bankomat')">🏧 Bankomat</button>

</div>

</div>

<script>

let userLocation = null
let userLang = "en"

function detectLanguage(){

const lang = navigator.language || navigator.userLanguage

if(lang.startsWith("hr")) userLang="hr"
if(lang.startsWith("de")) userLang="de"
if(lang.startsWith("it")) userLang="it"

console.log("Jezik:",userLang)

}

detectLanguage()

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

userLocation={
lat:position.coords.latitude,
lon:position.coords.longitude
}

console.log("Lokacija:",userLocation)

})

}

}

getLocation()

function addMessage(text,type){

const messages=document.getElementById("messages")

const div=document.createElement("div")
div.className="message "+type
div.innerHTML=text

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

function quick(text){

document.getElementById("input").value=text
sendMessage()

}

async function sendMessage(){

const input=document.getElementById("input")
const text=input.value

if(!text) return

addMessage(text,"user")

input.value=""

const response=await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text,
location:userLocation,
lang:userLang
})

})

const data=await response.json()

addMessage(data.reply,"bot")

}

addMessage("Dobrodošli u Biograd na Moru 🌊 Kako vam mogu pomoći?","bot")

</script>

</body>

</html>
