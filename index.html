<script>
function getLocation() {

  if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(function(position) {

      const lat = position.coords.latitude
      const lon = position.coords.longitude

      console.log("Lokacija korisnika:", lat, lon)

      window.userLocation = {
        lat: lat,
        lon: lon
      }

    }, function() {

      console.log("Korisnik nije dozvolio lokaciju")

    })

  } else {

    console.log("Geolocation nije podržan")

  }
}

getLocation()
</script>
