<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <title>AI Turistički Informator – Biograd na Moru</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1f4e79, #2e75b6);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      height: 80vh;
    }

    .header {
      background: #1f4e79;
      color: white;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px 15px;
      border-radius: 15px;
      max-width: 70%;
      line-height: 1.4;
    }

    .user {
      background: #2e75b6;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #eee;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 15px 20px;
      border: none;
      background: #1f4e79;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #163a5c;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    AI Turistički Informator – Biograd na Moru
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="messageInput" type="text" placeholder="Postavite pitanje..." />
    <button onclick="sendMessage()">Pošalji</button>
  </div>
</div>

<script>
  const chatDiv = document.getElementById("chat");
  const input = document.getElementById("messageInput");

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.classList.add("message", sender);
    div.innerText = text;
    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  }

  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      if (!response.ok) {
        throw new Error("Server error");
      }

      const data = await response.json();
      addMessage(data.reply, "bot");

    } catch (error) {
      addMessage("Greška pri povezivanju sa serverom.", "bot");
    }
  }

  input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });
</script>

</body>
</html>
