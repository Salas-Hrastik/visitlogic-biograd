<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Informator – Biograd na Moru</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 100%;
  max-width: 650px;
  height: 90vh;
  background: white;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  overflow: hidden;
}

.header {
  background: #0ea5e9;
  color: white;
  padding: 18px;
  font-size: 18px;
  font-weight: 600;
  text-align: center;
}

.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  background: #f9fafb;
}

.message {
  margin-bottom: 15px;
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.4;
  font-size: 15px;
  white-space: pre-wrap;
}

.user {
  background: #2563eb;
  color: white;
  margin-left: auto;
  border-bottom-right-radius: 6px;
}

.ai {
  background: #e5e7eb;
  color: #111827;
  border-bottom-left-radius: 6px;
}

.input-area {
  display: flex;
  padding: 15px;
  border-top: 1px solid #e5e7eb;
  background: white;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 25px;
  border: 1px solid #d1d5db;
  font-size: 14px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 12px 18px;
  border-radius: 25px;
  border: none;
  background: #0ea5e9;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0284c7;
}

.typing {
  font-size: 13px;
  color: #6b7280;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">
    🌊 AI Informator – Biograd na Moru
  </div>

  <div id="messages" class="messages"></div>

  <div class="input-area">
    <input id="messageInput" placeholder="Postavite pitanje..." />
    <button onclick="sendMessage()">Pošalji</button>
  </div>
</div>

<script>
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.classList.add("message", type);
  msg.innerText = text;
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const typingIndicator = document.createElement("div");
  typingIndicator.classList.add("typing");
  typingIndicator.innerText = "AI razmišlja...";
  messagesDiv.appendChild(typingIndicator);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await response.json();
    typingIndicator.remove();
    addMessage(data.odgovor || "Nema odgovora.", "ai");

  } catch (error) {
    typingIndicator.remove();
    addMessage("Došlo je do pogreške.", "ai");
  }
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
