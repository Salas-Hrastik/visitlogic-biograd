<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI turistički informator – Biograd na Moru</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0b6fa4;
color:white;
padding:20px;
text-align:center;
}

.chat-container{
max-width:800px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.messages{
height:350px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.message{
margin:10px 0;
}

.user{
text-align:right;
}

.bot{
color:#0b6fa4;
}

.input-row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
font-size:16px;
}

button{
padding:12px 20px;
background:#0b6fa4;
color:white;
border:none;
cursor:pointer;
}

.quick{
margin-top:15px;
display:flex;
gap:10px;
}

.quick button{
background:#eee;
color:#333;
}

</style>

</head>

<body>

<header>
<h2>AI turistički informator</h2>
<div>Biograd na Moru</div>
</header>

<div class="chat-container">

<div id="messages" class="messages"></div>

<div class="input-row">
<input id="input" placeholder="Postavite pitanje...">
<button onclick="sendMessage()">Pošalji</button>
</div>

<div class="quick">
<button onclick="quick('plaže')">🏖 Plaže</button>
<button onclick="quick('restorani')">🍽 Restorani</button>
<button onclick="quick('parking')">🅿 Parking</button>
<button onclick="quick('bankomat')">🏧 Bankomat</button>
</div>

</div>

<script>

let userLocation=null

function addMessage(text,type){

const messages=document.getElementById("messages")

const div=document.createElement("div")

div.className="message "+type

div.innerText=text

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

async function sendMessage(){

const input=document.getElementById("input")

const text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

try{

const response=await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text,
location:userLocation
})

})

const data=await response.json()

if(data.reply){

addMessage(data.reply,"bot")

}else{

addMessage("Bot nema odgovor.","bot")

}

}catch(err){

addMessage("Greška u komunikaciji sa serverom.","bot")

console.log(err)

}

}

function quick(text){

document.getElementById("input").value=text

sendMessage()

}

document.getElementById("input").addEventListener("keydown",function(e){

if(e.key==="Enter"){

sendMessage()

}

})

addMessage("Dobrodošli u Biograd na Moru 🌊 Kako vam mogu pomoći?","bot")

</script>

</body>

</html>
