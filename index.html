<!DOCTYPE html>
<html lang="hr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI turistički informator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0b6fa4;
color:white;
padding:20px;
text-align:center;
}

.chat{
max-width:700px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
}

.messages{
height:350px;
overflow:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.user{
text-align:right;
margin:10px 0;
}

.bot{
color:#0b6fa4;
margin:10px 0;
}

.row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
font-size:16px;
}

button{
padding:12px 20px;
background:#0b6fa4;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h2>AI turistički informator</h2>
<div>Biograd na Moru</div>
</header>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="row">
<input id="input" placeholder="Postavite pitanje...">
<button onclick="sendMessage()">Pošalji</button>
</div>

</div>

<script>

function addMessage(text,type){

const div=document.createElement("div")
div.className=type
div.innerText=text

document.getElementById("messages").appendChild(div)

document.getElementById("messages").scrollTop=
document.getElementById("messages").scrollHeight

}

async function sendMessage(){

const input=document.getElementById("input")

const text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

try{

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
})

const raw=await res.text()

console.log("API odgovor:",raw)

let data

try{
data=JSON.parse(raw)
}catch{
addMessage(raw,"bot")
return
}

if(data.reply){
addMessage(data.reply,"bot")
}else{
addMessage("Bot nema odgovor.","bot")
}

}catch(err){

console.log(err)

addMessage("Greška u komunikaciji sa serverom.","bot")

}

}

document.getElementById("input").addEventListener("keydown",function(e){

if(e.key==="Enter"){
sendMessage()
}

})

addMessage("Dobrodošli u Biograd na Moru 🌊 Kako vam mogu pomoći?","bot")

</script>

</body>
</html>
