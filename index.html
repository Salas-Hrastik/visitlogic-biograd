<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Turistički Informator – Biograd na Moru</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f4e79, #2e86c1);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 900px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #1f4e79;
      color: white;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }

    .chat-area {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
      background: #f4f6f9;
    }

    .bot-message, .user-message {
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      max-width: 80%;
    }

    .bot-message {
      background: #e4e9f2;
    }

    .user-message {
      background: #2e86c1;
      color: white;
      margin-left: auto;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 15px 25px;
      border: none;
      background: #1f4e79;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #163a5c;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .card strong {
      font-size: 17px;
    }

    a {
      color: #1f4e79;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      AI Turistički Informator – Biograd na Moru
    </div>

    <div id="chat-box" class="chat-area">
      <div class="bot-message">
        Dobrodošli u Biograd na Moru.<br><br>
        Pitajte za restorane, plaže, smještaj, ljekarne ili izlete.
      </div>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="Postavite pitanje..." />
      <button id="send-btn">Pošalji</button>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
