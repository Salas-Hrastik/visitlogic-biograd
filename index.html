<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Turistički Informator – Biograd na Moru</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#1f4e79,#2e86c1);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:90%;
  max-width:900px;
  background:white;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header {
  background:#1f4e79;
  color:white;
  padding:20px;
  text-align:center;
  font-weight:bold;
  font-size:22px;
}

.chat-area {
  padding:20px;
  overflow-y:auto;
  flex:1;
  background:#f4f6f9;
}

.bot-message,.user-message {
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
  max-width:80%;
}

.bot-message { background:#e4e9f2; }
.user-message {
  background:#2e86c1;
  color:white;
  margin-left:auto;
}

.card {
  background:white;
  padding:18px;
  margin-bottom:14px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.map-btn,.web-btn {
  display:inline-block;
  margin-top:8px;
  margin-right:8px;
  padding:8px 14px;
  background:#1f4e79;
  color:white;
  border-radius:8px;
  text-decoration:none;
  font-size:14px;
}

.map-btn:hover,.web-btn:hover {
  background:#163a5c;
}

.input-area {
  display:flex;
  border-top:1px solid #ddd;
}

input {
  flex:1;
  padding:15px;
  border:none;
  font-size:16px;
  outline:none;
}

button {
  padding:15px 25px;
  border:none;
  background:#1f4e79;
  color:white;
  cursor:pointer;
}

button:hover { background:#163a5c; }
</style>
</head>

<body>
<div class="container">

<div class="header">
AI Turistički Informator – Biograd na Moru
</div>

<div id="chat-box" class="chat-area">
<div class="bot-message">
Dobrodošli u Biograd na Moru.<br><br>
Upišite: restorani, plaže, smještaj, ljekarne ili izleti.
</div>
</div>

<div class="input-area">
<input id="user-input" type="text" placeholder="Postavite pitanje..." />
<button id="send-btn">Pošalji</button>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
