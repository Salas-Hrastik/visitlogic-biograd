<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Turistički vodič – Biograd na Moru</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a3a66;
color:white;
}

header{
background:#072a4d;
padding:18px;
display:flex;
align-items:center;
gap:15px;
}

header img{
height:40px;
}

header h1{
font-size:22px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.chat{
background:white;
color:black;
border-radius:12px;
height:450px;
overflow-y:auto;
padding:20px;
}

.message{
margin:10px 0;
}

.user{
text-align:right;
}

.assistant{
text-align:left;
}

.card{
background:#f2f7ff;
border-radius:8px;
padding:12px;
margin:8px 0;
border-left:4px solid #0a3a66;
}

.menu{
margin-top:15px;
}

.menu button{

background:#1c6fb8;
border:none;
color:white;
padding:10px 14px;
border-radius:6px;
margin:4px;
cursor:pointer;
}

.menu button:hover{
background:#165a96;
}

.inputRow{
display:flex;
margin-top:10px;
}

input{
flex:1;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
}

button.send{
background:#f0b429;
border:none;
padding:12px 18px;
border-radius:6px;
font-weight:bold;
margin-left:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<img src="tz-logo-biograd.png">

<h1>AI turistički informator – Biograd na Moru</h1>

</header>

<div class="container">

<div id="chat" class="chat"></div>

<div class="menu">

<button onclick="quick('plaže')">🏖 Plaže</button>
<button onclick="quick('marina')">⛵ Marina</button>
<button onclick="quick('restoran')">🍽 Gastronomija</button>
<button onclick="quick('znamenitosti')">🏛 Znamenitosti</button>
<button onclick="quick('događanja')">🎉 Događanja</button>
<button onclick="quick('smještaj')">🏨 Smještaj</button>

</div>

<div class="inputRow">

<input id="userInput" placeholder="Postavite pitanje o Biogradu...">

<button class="send" onclick="sendMessage()">Pošalji</button>

</div>

</div>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("userInput")

let conversation=[]

function addMessage(text,role){

const div=document.createElement("div")

div.className="message "+role

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function addCards(title,items){

addMessage(title,"assistant")

items.forEach(item=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

<b>${item.naziv}</b><br>
${item.opis || ""}<br>
⭐ ${item.ocjena || ""}

`

chat.appendChild(div)

})

}

async function sendMessage(){

const text=input.value.trim()

if(!text) return

addMessage(text,"user")

conversation.push({
role:"user",
content:text
})

input.value=""

try{

const response=await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({conversation})

})

const data=await response.json()

if(data.type==="cards"){

addCards(data.title,data.items)

}else{

addMessage(data.reply,"assistant")

}

}catch{

addMessage("Greška u komunikaciji sa serverom.","assistant")

}

}

function quick(text){

input.value=text

sendMessage()

}

</script>

</body>
</html>
